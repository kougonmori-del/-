<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#ffffff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="家計簿&健康" />
  <title>家計簿 & 健康</title>
  <link rel="manifest" href="./manifest.json" />
  <link rel="apple-touch-icon" href="./assets/icon-180.png" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div>
        <h1>家計簿 & 健康</h1>
        <p>自分専用 / 端末保存</p>
      </div>
      <button id="backup-export-btn" class="ghost-button small">書き出し</button>
    </header>

    <main class="app-main">
      <section id="tab-home" class="tab-section active"></section>
      <section id="tab-finance" class="tab-section"></section>
      <section id="tab-health" class="tab-section"></section>
      <section id="tab-analytics" class="tab-section"></section>
      <section id="tab-settings" class="tab-section"></section>
    </main>

    <nav class="bottom-nav">
      <button class="nav-button active" data-tab="home">ホーム</button>
      <button class="nav-button" data-tab="finance">家計簿</button>
      <button class="nav-button" data-tab="health">健康</button>
      <button class="nav-button" data-tab="analytics">集計</button>
      <button class="nav-button" data-tab="settings">設定</button>
    </nav>
  </div>

  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal-card">
      <div class="modal-header">
        <h2 id="modal-title">入力</h2>
        <button id="modal-close-btn" class="ghost-button">閉じる</button>
      </div>
      <div id="modal-body" class="modal-body"></div>
    </div>
  </div>

  <input id="backup-import-input" type="file" accept="application/json" hidden />

  <script src="./app.js"></script>
</body>
</html>
